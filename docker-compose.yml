services:
  api:
    build:
      context: .
    container_name: papergraph-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_DATABASE_URL: postgresql+asyncpg://papergraph:papergraph@postgres:5432/papergraph
      POSTGRES_SYNC_DATABASE_URL: postgresql+psycopg://papergraph:papergraph@postgres:5432/papergraph
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4318/v1/traces
    command:
      - uv
      - run
      - uvicorn
      - app.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app
    depends_on:
      migrate-feedback:
        condition: service_completed_successfully
      tempo:
        condition: service_started

  migrate-feedback:
    build:
      context: .
    container_name: papergraph-migrate-feedback
    restart: on-failure
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      POSTGRES_DATABASE_URL: postgresql+asyncpg://papergraph:papergraph@postgres:5432/papergraph
      POSTGRES_SYNC_DATABASE_URL: postgresql+psycopg://papergraph:papergraph@postgres:5432/papergraph
    command:
      - uv
      - run
      - alembic
      - upgrade
      - feedback@head
    depends_on:
      - postgres

  migrate-external:
    build:
      context: .
    container_name: papergraph-migrate-external
    profiles:
      - migrations
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      POSTGRES_DATABASE_URL: postgresql+asyncpg://papergraph:papergraph@postgres:5432/papergraph
      POSTGRES_SYNC_DATABASE_URL: postgresql+psycopg://papergraph:papergraph@postgres:5432/papergraph
    command:
      - uv
      - run
      - alembic
      - upgrade
      - heads
    depends_on:
      - qdrant
      - neo4j
      - postgres

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: papergraph-ui
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
    environment:
      API_URL: http://api:8000
    command:
      - streamlit
      - run
      - app/ui.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.runOnSave=true
      - --server.fileWatcherType=poll
    depends_on:
      - api

  qdrant:
    image: qdrant/qdrant:latest
    container_name: papergraph-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: papergraph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  postgres:
    image: postgres:16-alpine
    container_name: papergraph-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: papergraph
      POSTGRES_USER: papergraph
      POSTGRES_PASSWORD: papergraph
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: papergraph-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_storage:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - pushgateway

  pushgateway:
    image: prom/pushgateway:latest
    container_name: papergraph-pushgateway
    ports:
      - "9091:9091"

  tempo:
    image: grafana/tempo:latest
    container_name: papergraph-tempo
    user: "0:0"
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_storage:/tmp/tempo
    command:
      - "-config.file=/etc/tempo.yml"

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: papergraph-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - postgres

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  prometheus_storage:
  tempo_storage:
  grafana_storage:
