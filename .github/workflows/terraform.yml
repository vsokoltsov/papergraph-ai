name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

jobs:
  terraform-fmt:
    name: Check Terraform Formatting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

  terraform-init:
    name: Initialize Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform provider plugins
        uses: actions/cache@v4
        with:
          path: .terraform.d/plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Initialize Terraform
        run: terraform init -backend=false

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs:
      - terraform-init

    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Terraform plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Restore Terraform provider plugin cache
        uses: actions/cache/restore@v4
        with:
          path: .terraform.d/plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Initialize Terraform for validation
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate
