name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      llm_eval_mode:
        description: "LLM evaluation size"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ruff
        run: |
          uv run ruff check app migrations tests
          uv run ruff format --check app migrations tests

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ty
        run: uv run ty check app migrations tests

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests with coverage
        run: uv run pytest -q --cov=app --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  retrieval-eval:
    name: Retrieval Evaluation
    runs-on: ubuntu-latest
    needs:
      - test
    continue-on-error: true
    timeout-minutes: 20
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      LOG_LEVEL: WARNING
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION_NAME: papers
      QDRANT_VECTOR_SIZE: 384
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      ONNXRUNTIME_LOG_SEVERITY_LEVEL: "3"
      ORT_LOGGING_LEVEL: ERROR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create empty env file for Docker Compose
        run: touch .env

      - name: Start retrieval services
        run: docker compose up -d qdrant neo4j

      - name: Wait for retrieval services
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:6333/collections > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Qdrant did not become ready"
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if docker compose exec -T neo4j cypher-shell -u neo4j -p password "RETURN 1" > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Neo4j did not become ready"
              exit 1
            fi

            sleep 2
          done

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Seed retrieval databases
        run: uv run python -m app.cli "knowledge graph based retrieval augmented generation" --limit 10

      - name: Run retrieval evaluation
        run: |
          uv run python -m app.eval.retrieval.evaluate \
            --output-format markdown \
            --approaches qdrant_vector neo4j_graph qdrant_vector_plus_graph \
            --output-dir eval-results

      - name: Add evaluation summary
        run: |
          echo "## Retrieval Evaluation" >> "$GITHUB_STEP_SUMMARY"
          cat eval-results/retrieval-eval.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload retrieval evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-eval
          path: eval-results/

  llm-eval:
    name: LLM Evaluation
    runs-on: ubuntu-latest
    needs:
      - test
    continue-on-error: true
    timeout-minutes: 30
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LOG_LEVEL: WARNING
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION_NAME: papers
      QDRANT_VECTOR_SIZE: 384
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      ONNXRUNTIME_LOG_SEVERITY_LEVEL: "3"
      ORT_LOGGING_LEVEL: ERROR
      OTEL_TRACING_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create empty env file for Docker Compose
        run: touch .env

      - name: Start retrieval services
        run: docker compose up -d qdrant neo4j

      - name: Wait for retrieval services
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:6333/collections > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Qdrant did not become ready"
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if docker compose exec -T neo4j cypher-shell -u neo4j -p password "RETURN 1" > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Neo4j did not become ready"
              exit 1
            fi

            sleep 2
          done

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Seed evaluation databases
        run: uv run python -m app.cli "knowledge graph based retrieval augmented generation" --limit 10

      - name: Run LLM smoke evaluation
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.llm_eval_mode == 'smoke' }}
        run: |
          uv run python -m app.eval.llm.evaluate \
            --dataset app/eval/llm/llm_dataset.json \
            --output-format markdown \
            --limit 2 \
            --approaches vector_only vector_plus_graph \
            --output-dir eval-results

      - name: Run full LLM evaluation
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.llm_eval_mode == 'full' }}
        run: |
          uv run python -m app.eval.llm.evaluate \
            --dataset app/eval/llm/llm_dataset.json \
            --output-format markdown \
            --output-dir eval-results

      - name: Add LLM evaluation summary
        run: |
          cat eval-results/llm-eval.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LLM evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval
          path: eval-results/
