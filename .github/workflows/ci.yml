name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      llm_eval_mode:
        description: "LLM evaluation size"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ruff
        run: |
          uv run ruff check app migrations tests
          uv run ruff format --check app migrations tests

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ty
        run: uv run ty check app migrations tests

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests with coverage
        run: uv run pytest -q --cov=app --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  retrieval-eval:
    name: Retrieval Evaluation
    runs-on: ubuntu-latest
    needs:
      - test
    continue-on-error: true
    timeout-minutes: 20
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      LOG_LEVEL: WARNING
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION_NAME: papers
      QDRANT_VECTOR_SIZE: 384
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      POSTGRES_DATABASE_URL: postgresql+asyncpg://papergraph:papergraph@localhost:5432/papergraph
      POSTGRES_SYNC_DATABASE_URL: postgresql+psycopg://papergraph:papergraph@localhost:5432/papergraph
      ONNXRUNTIME_LOG_SEVERITY_LEVEL: "3"
      ORT_LOGGING_LEVEL: ERROR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create empty env file for Docker Compose
        run: touch .env

      - name: Start retrieval services
        run: docker compose up -d qdrant neo4j postgres

      - name: Wait for retrieval services
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:6333/collections > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Qdrant did not become ready"
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if docker compose exec -T neo4j cypher-shell -u neo4j -p password "RETURN 1" > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Neo4j did not become ready"
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if docker compose exec -T postgres pg_isready -U papergraph -d papergraph > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "PostgreSQL did not become ready"
              exit 1
            fi

            sleep 2
          done

      - name: Run migrations
        run: uv run alembic upgrade heads

      - name: Seed retrieval databases
        run: uv run python -m app.cli "knowledge graph based retrieval augmented generation" --limit 10

      - name: Run retrieval evaluation
        run: |
          uv run python -m app.eval.retrieval.evaluate \
            --output-format markdown \
            --approaches qdrant_vector neo4j_graph qdrant_vector_plus_graph \
            --output-dir eval-results

      - name: Add evaluation summary
        run: |
          echo "## Retrieval Evaluation" >> "$GITHUB_STEP_SUMMARY"
          cat eval-results/retrieval-eval.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload retrieval evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-eval
          path: eval-results/

  llm-eval:
    name: LLM Evaluation
    runs-on: ubuntu-latest
    needs:
      - test
    continue-on-error: true
    timeout-minutes: 30
    env:
      OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LOG_LEVEL: WARNING
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION_NAME: papers
      QDRANT_VECTOR_SIZE: 384
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      POSTGRES_DATABASE_URL: postgresql+asyncpg://papergraph:papergraph@localhost:5432/papergraph
      POSTGRES_SYNC_DATABASE_URL: postgresql+psycopg://papergraph:papergraph@localhost:5432/papergraph
      ONNXRUNTIME_LOG_SEVERITY_LEVEL: "3"
      ORT_LOGGING_LEVEL: ERROR
      OTEL_TRACING_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create empty env file for Docker Compose
        run: touch .env

      - name: Start retrieval services
        run: docker compose up -d qdrant neo4j postgres

      - name: Wait for retrieval services
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:6333/collections > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Qdrant did not become ready"
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if docker compose exec -T neo4j cypher-shell -u neo4j -p password "RETURN 1" > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Neo4j did not become ready"
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if docker compose exec -T postgres pg_isready -U papergraph -d papergraph > /dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "PostgreSQL did not become ready"
              exit 1
            fi

            sleep 2
          done

      - name: Run migrations
        run: uv run alembic upgrade heads

      - name: Seed evaluation databases
        run: uv run python -m app.cli "knowledge graph based retrieval augmented generation" --limit 10

      - name: Run LLM smoke evaluation
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.llm_eval_mode == 'smoke' }}
        run: |
          uv run python -m app.eval.llm.evaluate \
            --dataset app/eval/llm/llm_dataset.json \
            --output-format markdown \
            --limit 2 \
            --approaches vector_only vector_plus_graph \
            --output-dir eval-results

      - name: Run full LLM evaluation
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.llm_eval_mode == 'full' }}
        run: |
          uv run python -m app.eval.llm.evaluate \
            --dataset app/eval/llm/llm_dataset.json \
            --output-format markdown \
            --output-dir eval-results

      - name: Add LLM evaluation summary
        run: |
          cat eval-results/llm-eval.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload LLM evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval
          path: eval-results/

  build-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs:
      - test
      - retrieval-eval
      - llm-eval
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GAR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.ARTIFACT_REGISTRY_URL }}/api:${{ github.sha }}
            ${{ vars.ARTIFACT_REGISTRY_URL }}/api:latest

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: |
            ${{ vars.ARTIFACT_REGISTRY_URL }}/ui:${{ github.sha }}
            ${{ vars.ARTIFACT_REGISTRY_URL }}/ui:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - build-images
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Sync Kubernetes deployment secret
        run: |
          set -euo pipefail

          secret_dir="$(mktemp -d)"
          trap 'rm -rf "$secret_dir"' EXIT

          kubectl create namespace "${{ vars.HELM_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

          secret_args=()

          for secret_name in \
            OPENALEX_API_KEY \
            OPENAI_API_KEY \
            NEO4J_USER \
            NEO4J_PASSWORD \
            POSTGRES_PASSWORD
          do
            gcloud secrets versions access latest \
              --project "${{ vars.SECRET_MANAGER_PROJECT_ID }}" \
              --secret "$secret_name" > "$secret_dir/$secret_name"
            secret_args+=("--from-file=${secret_name}=${secret_dir}/${secret_name}")
          done

          for secret_name in LOGFIRE_API_KEY
          do
            if gcloud secrets versions access latest \
              --project "${{ vars.SECRET_MANAGER_PROJECT_ID }}" \
              --secret "$secret_name" > "$secret_dir/$secret_name"; then
              secret_args+=("--from-file=${secret_name}=${secret_dir}/${secret_name}")
            else
              echo "Skipping optional Secret Manager key: $secret_name"
            fi
          done

          printf "%s/%s" \
            "$(cat "$secret_dir/NEO4J_USER")" \
            "$(cat "$secret_dir/NEO4J_PASSWORD")" > "$secret_dir/NEO4J_AUTH"
          secret_args+=("--from-file=NEO4J_AUTH=${secret_dir}/NEO4J_AUTH")

          kubectl create secret generic "${{ vars.HELM_RELEASE }}-secrets" \
            --namespace "${{ vars.HELM_NAMESPACE }}" \
            "${secret_args[@]}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy Helm chart
        run: |
          helm upgrade --install "${{ vars.HELM_RELEASE }}" infra/helm/papergraph \
            --namespace "${{ vars.HELM_NAMESPACE }}" \
            --create-namespace \
            --timeout 10m \
            --set-string serviceAccount.gcpServiceAccount="${{ vars.GKE_WORKLOAD_SERVICE_ACCOUNT }}" \
            --set-string images.api="${{ vars.ARTIFACT_REGISTRY_URL }}/api:${{ github.sha }}" \
            --set-string images.ui="${{ vars.ARTIFACT_REGISTRY_URL }}/ui:${{ github.sha }}" \
            --set-string externalSecrets.projectId="${{ vars.SECRET_MANAGER_PROJECT_ID }}" \
            --set-string external.postgresHost="${{ vars.CLOUD_SQL_PRIVATE_IP }}" \
            --set-string external.postgresDatabase="${{ vars.POSTGRES_DATABASE }}" \
            --set-string external.postgresUser="${{ vars.POSTGRES_USER }}" \
            --set-string external.apiUrl="${{ vars.PAPERGRAPH_API_URL }}" \
            --set-string external.qdrantUrl="${{ vars.QDRANT_URL }}" \
            --set-string external.neo4jUri="${{ vars.NEO4J_URI }}" \
            --set-string config.prometheusPushgatewayUrl="${{ vars.PROMETHEUS_PUSHGATEWAY_URL }}" \
            --set-string config.otelServiceName="${{ vars.OTEL_SERVICE_NAME }}" \
            --set-string config.otelTracingEnabled="${{ vars.OTEL_TRACING_ENABLED }}" \
            --set-string config.otelExporterOtlpTracesEndpoint="${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT }}" \
            --set-string config.logfireEnabled="${{ vars.LOGFIRE_ENABLED }}" \
            --set api.serviceType=LoadBalancer \
            --set-string api.loadBalancerIP="${{ vars.API_LOAD_BALANCER_IP }}" \
            --set qdrant.enabled=true \
            --set neo4j.enabled=true \
            --set externalSecrets.enabled=false \
            --set secrets.create=false \
            --set cloudRunUi.enabled=false

      - name: Show deployment diagnostics
        if: failure()
        run: |
          kubectl get all,secrets,externalsecrets,secretstores -n "${{ vars.HELM_NAMESPACE }}" || true
          kubectl describe job "${{ vars.HELM_RELEASE }}-migrate" -n "${{ vars.HELM_NAMESPACE }}" || true
          kubectl logs job/"${{ vars.HELM_RELEASE }}-migrate" -n "${{ vars.HELM_NAMESPACE }}" --all-containers --tail=200 || true
          kubectl get events -n "${{ vars.HELM_NAMESPACE }}" --sort-by=.lastTimestamp || true

      - name: Deploy Cloud Run UI
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_UI_SERVICE_NAME }}" \
            --image "${{ vars.ARTIFACT_REGISTRY_URL }}/ui:${{ github.sha }}" \
            --region "${{ vars.GCP_REGION }}" \
            --service-account "${{ vars.GKE_WORKLOAD_SERVICE_ACCOUNT }}" \
            --port 8501 \
            --set-env-vars API_URL="${{ vars.PAPERGRAPH_API_URL }}" \
            --allow-unauthenticated \
            --quiet
