external:
  qdrantUrl: ""
  neo4jUri: ""

externalSecrets:
  enabled: false

qdrant:
  enabled: true
  storageSize: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

neo4j:
  enabled: true
  storageSize: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
