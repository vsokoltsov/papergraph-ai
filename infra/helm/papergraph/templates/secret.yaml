{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "papergraph.name" . }}-secrets
  labels:
    {{- include "papergraph.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.externalSecrets.secretStoreName }}
  target:
    name: {{ include "papergraph.name" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENALEX_API_KEY
      remoteRef:
        key: OPENALEX_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: OPENAI_API_KEY
    - secretKey: NEO4J_USER
      remoteRef:
        key: NEO4J_USER
    - secretKey: NEO4J_PASSWORD
      remoteRef:
        key: NEO4J_PASSWORD
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: POSTGRES_PASSWORD
    - secretKey: LOGFIRE_API_KEY
      remoteRef:
        key: LOGFIRE_API_KEY
{{- else if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papergraph.name" . }}-secrets
  labels:
    {{- include "papergraph.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENALEX_API_KEY: {{ .Values.secrets.openalexApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  NEO4J_USER: {{ .Values.secrets.neo4jUser | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  LOGFIRE_API_KEY: {{ .Values.secrets.logfireApiKey | quote }}
{{- end }}
