{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "papergraph.name" . }}-secrets
  labels:
    {{- include "papergraph.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: SecretStore
    name: {{ .Values.externalSecrets.secretStoreName }}
  target:
    name: {{ include "papergraph.name" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENALEX_API_KEY
      remoteRef:
        key: OPENALEX_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: OPENAI_API_KEY
    - secretKey: QDRANT_URL
      remoteRef:
        key: QDRANT_URL
    - secretKey: NEO4J_URI
      remoteRef:
        key: NEO4J_URI
    - secretKey: NEO4J_USER
      remoteRef:
        key: NEO4J_USER
    - secretKey: NEO4J_PASSWORD
      remoteRef:
        key: NEO4J_PASSWORD
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: POSTGRES_PASSWORD
    - secretKey: API_URL
      remoteRef:
        key: PAPERGRAPH_API_URL
    - secretKey: LOGFIRE_TOKEN
      remoteRef:
        key: LOGFIRE_TOKEN
{{- else if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "papergraph.name" . }}-secrets
  labels:
    {{- include "papergraph.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENALEX_API_KEY: {{ .Values.secrets.openalexApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  QDRANT_URL: {{ .Values.external.qdrantUrl | quote }}
  NEO4J_URI: {{ .Values.external.neo4jUri | quote }}
  NEO4J_USER: {{ .Values.secrets.neo4jUser | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  API_URL: {{ .Values.external.apiUrl | quote }}
  LOGFIRE_TOKEN: {{ .Values.secrets.logfireToken | quote }}
{{- end }}
