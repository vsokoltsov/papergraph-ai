{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "papergraph.name" . }}-qdrant
  labels:
    {{- include "papergraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "papergraph.name" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "papergraph.name" . }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "papergraph.name" . }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
            - name: grpc
              containerPort: {{ .Values.qdrant.grpcPort }}
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.qdrant.storageSize | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "papergraph.name" . }}-qdrant
  labels:
    {{- include "papergraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "papergraph.name" . }}
    app.kubernetes.io/component: qdrant
  ports:
    - name: http
      port: {{ .Values.qdrant.port }}
      targetPort: http
    - name: grpc
      port: {{ .Values.qdrant.grpcPort }}
      targetPort: grpc
{{- end }}
